<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LittleXx Art</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部背景 -->
    <header>
        <div class="hero">
            <h1>LittleXx Art</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search artworks...">
        </div>
    </header>

    <!-- 作品展示 -->
    <section class="gallery">
        <!-- 3D 作品 -->
        <div class="category">
            <h2>3D Works</h2>
        </div>
        <div class="artworks">
            <div class="item">
                <a href="dying_kilns.html">
                    <img src="images/3d/dying_kins1.jpg" alt="Dying Kilns">
                </a>
                <h3>Dying Kilns（寄死窑）</h3>
            </div>
            <div class="item">
                <a href="miles_to_recognization.html">
                    <img src="images/3d/miles.jpg" alt="Miles to Recognization">
                </a>
                <h3>Miles to Recognization（和解之路漫漫）</h3>
            </div>
        </div>

        <!-- 交互装置 -->
        <div class="category">
            <h2>Interactive Installations</h2>
        </div>
        <div class="artworks">
            <div class="item">
                <a href="spiral_of_silence.html">
                    <img src="images/installation/spiral.jpg" alt="The Spiral of Silence">
                </a>
                <h3>The Spiral of Silence（沉默的螺旋）</h3>
            </div>
            <div class="item">
                <a href="sleep_everywhere.html">
                    <img src="images/installation/sleep.jpg" alt="Sleep Everywhere">
                </a>
                <h3>Sleep Everywhere（无处不眠）</h3>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 LittleXx Art. All rights reserved.</p>
    </footer>
</body>
</html>
